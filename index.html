<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Astropeeth</title>
</head>
<header class="header">
    <div class="container">

        <!-- Logo -->
        <div class="logo">
            <img src="Images/logo.svg" alt="AstroPeeth Logo">
        </div>

        <!-- Right Side -->
        <div class="header-right">

            <div class="header-item">
                <img src="Images/phone.svg" alt="">
                <span>Talk To Astrologer</span>
            </div>

            <div class="header-item">
                <img src="Images/msg.svg" alt="">
                <span>Talk To Astrologer</span>
            </div>

            <div class="header-item sign-in">
                <img src="Images/user.svg" alt="">
                <span>Sign In</span>
            </div>

            <div class="language">
                <img src="Images/Language.svg" alt="">
                <span>English</span>
                <img src="Images/arrow-down.svg" class="arrow" alt="">
            </div>

        </div>
    </div>
</header>

<body>
    <section class="top-strip">
        <div class="container strip-container">

            <div class="strip-item">
                <img src="Images/Kundali.svg" alt="">
                <span class="with-arrow">
                    Kundali
                    <img src="Images/arrow-down-red.svg" class="arrow" alt="">
                </span>
            </div>


            <div class="strip-item active">
                <img src="Images/Panchang.svg" alt="">
                <span>Panchang</span>
            </div>

            <div class="strip-item">
                <img src="Images/puja.svg" alt="">
                <span>Puja</span>
            </div>

            <div class="strip-item">
                <img src="Images/report.svg" alt="">
                <span>Report</span>
            </div>

            <div class="strip-item">
                <img src="Images/horoscope.svg" alt="">
                <span>Horoscope</span>
            </div>

            <div class="strip-item">
                <img src="Images/shop.svg" alt="">
                <span>Shop</span>
            </div>

            <div class="strip-item">
                <img src="Images/blog.svg" alt="">
                <span>Blog</span>
            </div>

        </div>
    </section>
    <script src="script.js" defer></script>
</body>

</html>
